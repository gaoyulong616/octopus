<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Octopus Agent</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐙</text></svg>">
  <link rel="stylesheet" href="/static/vendor/tabler-icons.min.css?v=1">
  <link id="highlight-css-light" rel="stylesheet" href="/static/vendor/github.css?v=15">
  <link id="highlight-css-dark" rel="stylesheet" href="/static/vendor/github-dark.css?v=15" disabled>
  <link rel="stylesheet" href="/static/style.css?v=107">
  <link rel="stylesheet" href="/static/vendor/xterm.css?v=15">
</head>
<body>

<div class="db-root">

  <!-- ───── 侧边栏 ───── -->
  <aside class="db-sidebar" id="sidebar">
    <div class="db-sidebar-inner">
    <div class="db-sb-head">
      <div class="db-logo">
        <div class="db-logo-icon" style="background:#e2e2ff;">🐙</div>
        Octopus
      </div>
      <div class="db-sb-head-icons">
        <button class="db-icon-btn" id="sidebar-toggle" title="折叠侧边栏"><i class="ti ti-menu-2"></i></button>
        <button class="db-icon-btn" id="theme-toggle" title="切换主题"><i class="ti ti-sun"></i></button>
      </div>
    </div>

    <button class="db-new-chat" id="new-session-btn">
      <i class="ti ti-plus"></i>
      <span>新对话</span>
    </button>

    <div class="db-search">
      <i class="ti ti-search"></i>
      <input type="text" id="session-search" placeholder="搜索会话" />
    </div>

    <div class="db-nav">
      <div class="db-nav-item act" id="nav-chat"><i class="ti ti-message-2"></i>对话</div>
      <div class="db-nav-item"><i class="ti ti-layout-grid"></i>智能体</div>
      <div class="db-nav-item" id="nav-skills"><i class="ti ti-box"></i>技能</div>
      <div class="db-nav-item" id="nav-filebrowser" data-view="filebrowser"><i class="ti ti-folder"></i>文件</div>
    </div>

    <div class="db-section-label">
      <span>历史对话</span>
      <button class="db-icon-btn" id="delete-mode-btn" title="批量删除"><i class="ti ti-trash"></i></button>
    </div>
    <div class="db-hist-list" id="session-list"></div>
    <div id="delete-bar" class="hidden" style="display:flex;gap:4px;align-items:center;padding:4px 10px;font-size:11px;">
      <button id="delete-select-all-btn" style="font-size:11px;background:none;border:1px solid #ddd;border-radius:4px;padding:2px 8px;cursor:pointer;">全选</button>
      <span id="delete-count" style="flex:1;text-align:center;color:#888;">已选 0 个</span>
      <button id="delete-confirm-btn" style="font-size:11px;background:none;border:1px solid #dc2626;color:#dc2626;border-radius:4px;padding:2px 8px;cursor:pointer;">删除</button>
      <button id="delete-cancel-btn" style="font-size:11px;background:none;border:1px solid #ddd;border-radius:4px;padding:2px 8px;cursor:pointer;">取消</button>
    </div>

    <!-- 文件浏览器侧栏（隐藏） -->
    <div id="fb-section" class="hidden">
      <div class="db-section-label">
        <span>文件浏览器</span>
        <button class="db-icon-btn" id="fb-reset" title="回到工作目录" style="margin-left:auto"><i class="ti ti-home"></i></button>
        <button class="db-icon-btn" id="fb-refresh" title="刷新"><i class="ti ti-refresh"></i></button>
      </div>
      <div class="fb-tree" id="fb-tree"></div>
    </div>

    <!-- 左下角用户区域：预留登录用户展示，目前写死为"高玉龙" -->
    <div class="db-sb-foot">
      <div class="db-user">
        <div class="db-ava" id="user-avatar">龙</div>
        <span class="db-user-name" id="model-info">高玉龙</span>
      </div>
    </div>
    </div> <!-- db-sidebar-inner -->
  </aside>
  <div class="db-resize-handle" id="sidebar-resize-handle"></div>

  <!-- ───── 主区域 ───── -->
  <div class="db-main">
    <button id="sidebar-expand" class="hidden" title="展开侧边栏"><i class="ti ti-menu-2"></i></button>

    <!-- 顶栏 -->
    <div class="db-topbar">
      <div class="db-topbar-title" id="session-title">Octopus</div>
      <span id="agent-label" class="db-agent-badge"></span>
      <div class="db-top-right">
        <div class="db-export-wrap">
          <button class="db-top-btn" id="export-btn"><i class="ti ti-download"></i>导出</button>
          <div class="db-export-menu hidden" id="export-menu">
            <div class="db-export-item" data-fmt="md"><i class="ti ti-file-text"></i>Markdown</div>
            <div class="db-export-item" data-fmt="html"><i class="ti ti-file-code"></i>HTML</div>
            <div class="db-export-item" data-fmt="pdf"><i class="ti ti-file-type-pdf"></i>PDF</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 对话区 -->
    <div class="db-chat" id="chat-scroll">
      <div class="db-welcome" id="welcome-panel">
        <div class="db-welcome-title">你好，我是Octopus，今天想聊点什么？</div>

        <div class="db-sugg-grid">
          <div class="db-sugg-card" data-prompt="帮我修复这个 bug：">
            <span class="db-sc-icon"><i class="ti ti-bug" style="color:#f5a623;font-size:20px"></i></span>
            <span class="db-sc-title">Debug 调试</span>
            <span class="db-sc-sub">定位并修复代码问题</span>
          </div>
          <div class="db-sugg-card" data-prompt="帮我写一个 ">
            <span class="db-sc-icon"><i class="ti ti-code" style="color:#3b3bef;font-size:20px"></i></span>
            <span class="db-sc-title">代码编写</span>
            <span class="db-sc-sub">编程、调试、代码解释</span>
          </div>
          <div class="db-sugg-card" data-prompt="请重构以下代码：">
            <span class="db-sc-icon"><i class="ti ti-pencil" style="color:#1a9e6e;font-size:20px"></i></span>
            <span class="db-sc-title">代码重构</span>
            <span class="db-sc-sub">优化结构、提升可读性</span>
          </div>
          <div class="db-sugg-card" data-prompt="请解释这个项目：">
            <span class="db-sc-icon"><i class="ti ti-world-search" style="color:#e05c2e;font-size:20px"></i></span>
            <span class="db-sc-title">项目分析</span>
            <span class="db-sc-sub">理解项目结构和逻辑</span>
          </div>
        </div>
      </div>
      <div id="messages"></div>
      <button class="db-scroll-bottom hidden" id="scroll-bottom-btn" title="滚动到底部"><i class="ti ti-arrow-down"></i></button>
    </div>
    <div id="terminal-container">
      <div id="xterm"></div>
    </div>
    <div id="editor-container">
      <!-- 4.1 标题行 -->
      <div class="editor-titlebar">
        <span class="editor-titlebar-text">Octopus 文本编辑器</span>
      </div>
      <!-- 4.2 工具栏 -->
      <div class="editor-toolbar" id="editor-toolbar">
        <button class="ed-btn" id="ed-new" title="新文件"><i class="ti ti-file-plus"></i></button>
        <button class="ed-btn" id="ed-open" title="打开文件/文件夹"><i class="ti ti-folder-open"></i></button>
        <button class="ed-btn" id="ed-save" title="保存"><i class="ti ti-device-floppy"></i></button>
        <button class="ed-btn" id="ed-saveas" title="另存为"><i class="ti ti-file-export"></i></button>
        <div class="ed-sep"></div>
        <button class="ed-btn" id="ed-undo" title="撤销"><i class="ti ti-arrow-back-up"></i></button>
        <button class="ed-btn" id="ed-redo" title="重做"><i class="ti ti-arrow-forward-up"></i></button>
        <div class="ed-sep"></div>
        <div class="ed-dropdown-wrap">
          <button class="ed-btn ed-dropdown-btn" id="ed-lang-btn" title="语法语言"><i class="ti ti-code"></i><span id="ed-lang-label">纯文本</span><i class="ti ti-chevron-down" style="font-size:10px"></i></button>
          <div class="ed-dropdown hidden" id="ed-lang-menu"></div>
        </div>
        <button class="ed-btn" id="ed-format" title="格式化"><i class="ti ti-source-code"></i></button>
        <button class="ed-btn" id="ed-minimap" title="缩略图"><i class="ti ti-map"></i></button>
        <div class="ed-sep"></div>
        <button class="ed-btn" id="ed-font-up" title="增大字号"><i class="ti ti-plus"></i></button>
        <button class="ed-btn" id="ed-font-down" title="减小字号"><i class="ti ti-minus"></i></button>
        <div class="ed-dropdown-wrap">
          <button class="ed-btn ed-dropdown-btn" id="ed-tabsize-btn" title="缩进宽度"><i class="ti ti-spacing-horizontal"></i><span id="ed-tabsize-label">4</span><i class="ti ti-chevron-down" style="font-size:10px"></i></button>
          <div class="ed-dropdown hidden" id="ed-tabsize-menu">
            <div class="ed-dropdown-item" data-val="2">2 空格</div>
            <div class="ed-dropdown-item" data-val="4">4 空格</div>
            <div class="ed-dropdown-item" data-val="8">8 空格</div>
          </div>
        </div>
        <div class="ed-sep"></div>
        <div class="ed-dropdown-wrap">
          <button class="ed-btn ed-dropdown-btn" id="ed-encoding-btn" title="文件编码"><i class="ti ti-file-orientation"></i><span id="ed-encoding-label">UTF-8</span><i class="ti ti-chevron-down" style="font-size:10px"></i></button>
          <div class="ed-dropdown hidden" id="ed-encoding-menu">
            <div class="ed-dropdown-item" data-val="utf-8">UTF-8</div>
            <div class="ed-dropdown-item" data-val="gbk">GBK</div>
          </div>
        </div>
        <div class="ed-dropdown-wrap">
          <button class="ed-btn ed-dropdown-btn" id="ed-eol-btn" title="换行符"><i class="ti ti-arrow-back"></i><span id="ed-eol-label">LF</span><i class="ti ti-chevron-down" style="font-size:10px"></i></button>
          <div class="ed-dropdown hidden" id="ed-eol-menu">
            <div class="ed-dropdown-item" data-val="lf">LF</div>
            <div class="ed-dropdown-item" data-val="crlf">CRLF</div>
          </div>
        </div>
        <div class="ed-sep"></div>
        <button class="ed-btn" id="ed-find" title="查找"><i class="ti ti-search"></i></button>
        <button class="ed-btn" id="ed-replace" title="查找替换"><i class="ti ti-arrows-exchange"></i></button>
        <div class="ed-sep"></div>
        <button class="ed-btn" id="ed-comment" title="切换行注释 (Ctrl+/)"><i class="ti ti-code"></i></button>
        <div class="ed-dropdown-wrap">
          <button class="ed-btn ed-dropdown-btn" id="ed-case-btn" title="大小写转换"><i class="ti ti-letter-case"></i><i class="ti ti-chevron-down" style="font-size:10px"></i></button>
          <div class="ed-dropdown hidden" id="ed-case-menu">
            <div class="ed-dropdown-item" data-val="upper">转大写</div>
            <div class="ed-dropdown-item" data-val="lower">转小写</div>
          </div>
        </div>
        <button class="ed-btn" id="ed-wordwrap" title="自动换行"><i class="ti ti-text-wrap"></i></button>
        <button class="ed-btn" id="ed-column" title="列选模式 (Alt)"><i class="ti ti-columns"></i></button>
        <button class="ed-btn" id="ed-gotoline" title="跳转到行"><i class="ti ti-list-numbers"></i></button>
        <div class="ed-sep"></div>
        <button class="ed-btn" id="ed-diff" title="差异对比（与磁盘文件对比）"><i class="ti ti-file-diff"></i></button>
      </div>
      <!-- 4.3 Tab 栏 -->
      <div class="editor-tabs-bar" id="editor-tabs-bar">
        <div class="editor-tabs-scroll" id="editor-tabs-scroll"></div>
        <button class="ed-tab-arrow hidden" id="ed-tab-left"><i class="ti ti-chevron-left"></i></button>
        <button class="ed-tab-arrow hidden" id="ed-tab-right"><i class="ti ti-chevron-right"></i></button>
        <button class="ed-btn" id="ed-close-all" title="关闭全部"><i class="ti ti-x"></i></button>
      </div>
      <!-- Monaco 编辑器 -->
      <div id="monaco-editor"></div>
      <!-- 4.4 状态栏 -->
      <div class="editor-statusbar" id="editor-statusbar">
        <span class="sb-item" id="sb-size"></span>
        <span class="sb-item" id="sb-indent">空格: 4</span>
        <span class="sb-item" id="sb-lang">纯文本</span>
        <span class="sb-item" id="sb-eol">LF</span>
        <span class="sb-item" id="sb-encoding">UTF-8</span>
        <span class="sb-item sb-selection hidden" id="sb-selection"></span>
        <span class="sb-item" id="sb-cursor">Ln 1, Col 1</span>
      </div>
    </div>

    <div class="db-input-area">
      <div class="db-input-box">
        <div id="image-preview-bar"></div>
        <div class="db-input-wrap">
          <textarea class="db-textarea" id="input" placeholder="输入任务或 / 命令..." rows="1"></textarea>
          <div id="autocomplete" class="hidden"></div>
          <div class="db-input-footer">
            <input type="file" id="file-input" accept="image/*" style="display:none" multiple>
            <button class="db-tool-btn" id="upload-btn"><i class="ti ti-paperclip"></i>上传</button>
            <div class="db-input-model-wrap">
              <button class="db-tool-btn" id="model-btn">
                <i class="ti ti-sparkles"></i><span id="model-btn-text">模型</span><i class="ti ti-chevron-down" style="font-size:10px"></i>
              </button>
              <div id="model-selector" class="hidden"></div>
            </div>
            <button class="db-tool-btn" id="mode-indicator" title="点击切换 Plan/Auto 模式"><i class="ti ti-wand"></i><span>auto</span></button>
            <button class="db-filter-btn" id="thinking-toggle" title="显示/隐藏思考过程"><i class="ti ti-brain"></i>思考</button>
            <button class="db-filter-btn" id="tools-toggle" title="显示/隐藏工具调用"><i class="ti ti-tool"></i>工具链</button>
            <div class="db-send-wrap">
              <button class="db-send-btn" id="mic-btn"><i class="ti ti-microphone"></i></button>
              <button class="db-send-btn hidden" id="send-btn"><i class="ti ti-arrow-up"></i></button>
              <button class="db-send-btn hidden" id="stop-btn" style="background:#dc2626;"><i class="ti ti-player-stop"></i></button>
            </div>
          </div>
        </div>
        <p class="db-disclaimer"><span id="token-bar"></span></p>
      </div>
      <button class="db-terminal-btn" id="terminal-btn" title="打开终端"><i class="ti ti-terminal-2"></i></button>
    </div>

  </div>
</div>

<!-- 工具确认对话框 -->
<div id="confirm-dialog" class="hidden">
  <div class="confirm-content">
    <div id="confirm-tool"></div>
    <div id="confirm-input"></div>
    <div class="confirm-actions">
      <button id="confirm-approve" class="btn-approve">允许</button>
      <button id="confirm-approve-all">允许所有此工具</button>
      <button id="confirm-reject" class="btn-reject">拒绝</button>
    </div>
  </div>
</div>

<!-- 目录信任对话框 -->
<div id="trust-dialog" class="hidden">
  <div class="trust-content">
    <h3>Do you trust this directory?</h3>
    <p id="trust-cwd"></p>
    <div class="trust-actions">
      <button id="trust-btn">Trust</button>
      <button id="trust-skip-btn">Don't trust (Plan mode)</button>
    </div>
  </div>
</div>

<!-- 通用确认对话框 -->
<div id="general-confirm-dialog" class="hidden">
  <div class="confirm-overlay-content">
    <h3 id="confirm-title"></h3>
    <p id="confirm-message"></p>
    <div class="confirm-overlay-actions">
      <button id="confirm-ok-btn" class="btn-approve">确认</button>
      <button id="confirm-cancel-btn" class="btn-reject">取消</button>
    </div>
  </div>
</div>

<!-- 图片灯箱 -->
<div id="image-lightbox">
  <div class="lightbox-backdrop"></div>
  <img class="lightbox-img" src="" alt="">
  <button class="lightbox-close" title="关闭">&times;</button>
  <button class="lightbox-download" title="下载"><i class="ti ti-download"></i></button>
</div>

<script src="/static/vendor/mermaid.min.js?v=1"></script>
<script src="/static/vendor/echarts.min.js?v=1"></script>
<script src="/static/vendor/xlsx.full.min.js?v=1"></script>
<script src="/static/vendor/marked.min.js?v=14"></script>
<script src="/static/vendor/purify.min.js?v=14"></script>
<script src="/static/vendor/highlight.min.js?v=14"></script>
<script src="/static/vendor/xterm.js?v=15"></script>
<script src="/static/vendor/xterm-addon-fit.js?v=15"></script>
<script src="/static/vendor/vs/loader.js?v=1"></script>
<script src="/static/app.js?v=110"></script>
</body>
</html>
